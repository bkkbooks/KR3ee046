body:
  text: 孫真人千金方論膏肓腧穴無所不治主羸瘦虛損夢中失精上氣咳逆狂惑忘誤取穴法令人正坐曲脊伸兩手以臂著膝前令正直手大指與膝頭齊以物支肘勿令臂得動搖從胛骨上角摸索全胛骨下頭其間當有四肋三間灸中間依胛骨之裡肋間空處去胛骨容側指許摩搽肉之表筋間空處按之自覺牽引胸戶中灸兩胛中各一處至六百壯多至千壯當覺氣下礱礱然如流水狀亦當有所下出若無停痰宿疾則無所下也若病人已困不能正坐當令側臥挽一臂令前求取穴灸之也求穴大較以右手從右肩上住指頭表所不及者是也左手亦然乃以前法灸之若不能久正坐常伸兩臂者亦可伏衣袱上伸兩臂令人挽兩胛骨使相離不爾胛骨覆穴不可得也所伏衣袱當令大小常定不爾則失其穴也此灸訖後令人陽氣康盛當消息以自補養取身體平復其穴近第五椎相準望取之論曰昔秦緩不救晉侯之疾以其在膏之上肓之下針藥所不及即此穴是也時人拙不能求得此穴所以宿疴難遣若能用心方便求得灸之無疾不愈矣王惟一明堂銅人灸經膏肓腧二穴在第四顀下兩傍相去各三寸主無所不療羸瘦虛損夢中失精上氣咳逆發狂健忘又取穴之法令人正坐曲脊伸兩手以臂著膝前令正直手大指與膝頭齊以物支肘勿令臂動搖也從胛骨上角摸索至骨下頭其間當有四肋三間灸中間從胛骨之裡去胛容側指許摩搽去表肋間空處按之自覺牽引於肩中灸兩胛中一處至百壯多至五百壯當覺下礱礱似流水之狀亦當有所下出若得痰疾則無所不下也如病人已困不能正坐當令側臥挽上臂令前取穴灸之又以右手從左肩上住指頭所不及者是穴也左取亦然乃以前法灸之若不能久坐當伸兩臂令人挽兩胛骨使相離不爾即胛骨覆其穴灸之無驗此灸訖後令人陽氣康盛當消息以自補養論曰昔在和緩不救晉侯之疾以其膏之上肩之下針藥不能及即此穴是也人不能求得此穴所以宿病難遣若能用心以方便求得灸之無疾不愈出千金外臺方量同身寸法第一千金方云尺寸之法依古者八寸為尺仍取病者男左女右手中指上第一節為一寸亦有長短不定者即取手大拇指第一節橫度為一寸以意消息巧拙在人外臺方亦同上法又一云三寸者盡一中指也聖惠方云今取男左女右手中指第二節內度兩橫紋相去為一寸自依此法療病多愈今以此為定穴取寸石藏用亦用聖惠方為準以蠟紙條子或薄篾量患人男左女右手中指中節橫紋上下相去長短為一寸謂之同身寸若曲指節旁取指側中節上下兩交角相去遠近為一寸若伸指即正取中指自上節下橫紋至中節中從上第二條橫紋長者相去遠近為一寸當曲指一寸長短亦相符合然人之身手指或有異者至於指紋亦各不同更在此意詳度之也此摺紙篾與同身寸相等為六寸逐寸以墨界之勿令長短有所出入不同截斷收之俟以此量灸穴自脊中第四顀下停分兩旁各三寸為膏肓腧足太陽膀胱經脈氣之所發也正坐伸臂法第二令患人用墩椅正坐兩足平踏至地膝與髀股高下俱平兩足相併足趾前齊盡脫去上體衣服若不盡脫則衣袖束臂不能使胛骨相離取穴不得若氣怯畏寒則反著衣以臂穿袖令領在胸前頸下以襟交覆腰間墨點定穴灸時更著背心以帶束近穴處勿令與坐炷下火相礙曲脊伸臂以兩手按膝上令中指當膝蓋中兩大指緊相併指頭與膝蓋骨前齊微用力直舉腕中勿令斜屈動搖段彥聰仲謀大夫云石藏用謂以左手按右膝右手按左膝則胛骨開嘗試用其説則兩手相交腕有高下胛骨亦蹈之偏側當止如舊法以左手按左膝為是揣顀骨定穴高下法第三令患人正坐曲脊伸臂以指揣項後脊骨自第一顀至第五顀更有大顀在第一顀上宛宛陷中非有骨也有骨處即是第一顀二字千金方古方並作椎王惟一校定明堂經改木旁為佳逐顀以墨點記之令上下端直分明墨點訖便以蛤粉浥干即免有擦動自第四顀至第五顀更以蠟紙或篾比量兩顀上下相去遠近折為三分亦以墨界脊上顀間取第四顀下二分微多第五顀上一分微少用濃墨圈定此是灸穴相去六寸之中以為兩穴高下遠近之準千金方謂穴近第五顀用準望取之故謂顀上三分之一也更量兩顀相去則同身寸一寸三分七釐微縮有無大段長短不同以參合甲乙經自大顀至脊骶並二十一顀共長三尺之法若顀骨分明縱有不同穴以顀數為定若以大顀至尾骶骨三尺法校之則令其人平身正立用徑直杖子以地比度至臍中心截斷回杖子於背上當脊骨中杖子盡處即是第十四顀下第十五顀上當中命門穴也又自命門穴上以同身寸量一尺三寸五分即是第四顀下九分七釐第五顀上四分其兩旁各三寸乃膏肓腧穴也若自第一顀比向下則當同身寸五寸一分有餘是也然人身上下停長短各自不同大概當以顀骨為定也王冰注素問云脊節為椎脊穹為骶定穴相去遠近法第四用先截量下同身六寸蠟紙或篾橫置脊骨第五顀上中央墨圈定處令寸數界盡當墨圈中心兩頭平直各三寸勿令展縮於紙篾兩頭盡處以墨圈之令圈大小直徑三分千金方云黃帝曰灸不三分是謂徒灸炷務大也小弱炷乃小作以意商度之小謂小兒弱謂虛弱之人也一半在紙篾頭內一半在紙篾頭外令與脊中第五顀二墨圈定高下處三圈相直以為兩穴相去遠近之準定穴相去遠近之圖鉤股按穴取平法第五又用前量同身寸紙篾自脊中第五顀上中央墨所圈處照脊骨端直向下比量四寸至第七顀以墨點記自墨點卻兩邊向上斜量至灸穴圈中心使各恰當同身寸之五寸以為兩穴高下平直之準參驗求穴法第六令患人平身正坐自以右手從右肩上住附項伸指直搭背上以墨記其中指指頭所及處左手亦然記之又以胛骨上角摸索至胛骨下頭其間當有四肋三間其四肋自胛骨橫排至脊骨上用力按摩如覺隱指是筋而非骨千金方謂筋間空處疑四肋肋字為誤而王惟一於銅人灸經中又並改筋間為肋間及以右手從右肩上住亦同千金翼改為左肩上住若以右手搭左肩則指之所及在第五椎下去穴甚遠皆非是當以方為正也灸穴當三間之中依胛骨下容側指許摩搽肉之表於筋間空處穴上按之自覺牽引胸肩中千金翼云牽引肩中石藏用人用篦子或筋頭按穴欲其堅實令患人易覺也及照所圈灸穴在先記患人指所及處之下或旁側指不可及處以驗穴之是非然指有短長膚有豐瘦若相合固善如不合即不可以此一端遂廢余法亦有人胛骨去脊骨相遠過同身寸三寸以上者即難用脊顀兩旁各三寸之法但求四肋三間之中依胛骨下容側指許為穴可也坐點坐灸法第七坐炷下火時令患人一依點穴時正坐伸臂頭項肩背手足腕膝不得少有欹側伸縮改易即及臂中舉按用力輕重亦常令勻若一事稍異於前胛骨便輒相近覆閉灸穴艾炷即在骨上或胛骨開而相遠動爭寸余火氣不入穴竅徒受苦楚無所益也若不失其穴灸至數壯覺胛骨中通熱而不甚痛意自快暢石用之云當覺臂中習習然也至數十壯後或若腕中酸辛若以機支或用軟帛於肘上腕中連束二臂令緩急得所亦能少助蓋手欲按而臂欲舉故腕中費力或少休頃刻亦無害但要安頓身體四肢一如前耳如日灸五十壯纍至數百為佳千金方云灸六百壯至千壯當覺氣下礱礱然如流水狀亦當有所下其治疾之效甚衆且敏有上氣喘滿即時平減者有婦人經候不通已八月灸兩日而下者如此之類甚多穴至在上而最能下氣非它穴藥石之比而又無所不治有疾者宜留意焉石用之取穴別法第八石藏用字用之京師大醫也其治療方術一從古法亦多為人灸此穴其取穴法令患人床榻上盤膝正坐隨人之肥瘠大小置栲栳或墊枕之類以衾絮冒之令兩臂相交平伏其上余亦相同乃用千金方不能久坐伸臂使伏衣袱上之意也其用堅物云欲大小高下常定勝於衣袱但臂之伸屈與古異耳其治皆效蓋醫者意也隨事增損初無定方孫真人笑秦緩之拙不能求得此穴但知針藥之不及不知火氣之能徹則求之浸巧是不為過也紹興已未歲余守武昌時總領邵戶部玉云少時病瘵得泉州僧為灸膏肓令伏於栲栳上僧以指節極力按尋其穴令病者覺中指麻乃是穴若指不麻或雖麻而非中指者皆非也已而求得之遂一灸而愈壬戌四月增記於此葉潘等取穴別法第九葉餘慶字無善平江人自云嘗病瘵疾其居對橋而行不能度有僧為之灸膏肓穴得百壯後二日即能行數里登降皆不倦自是康強其取穴法但並足垂手正身直立勿令俯仰取第四椎下兩旁同身寸各三寸灸時以軟物枕頭覆面臥垂手附身或臨時置身取安便而已其轉為人灸亦用此法云皆有功然與昔人取穴之法甚略又與千金方立點則立灸之説不合歐陽典世行之陳了翁瑩中壻也了翁得無為張濟針術其求穴尤妙嘗為行之灸膏肓俞故痕可見以葉所言校之葉穴微下蓋脊有曲直之殊不能無少異也又常熟縣醫工潘琪云渠傳之於師取穴之法正坐曲脊並足而仰兩手令大指與臍屈肘當髀股上亦自是其説雖與千金方伸臂令正直之法不同然比立點則近古矣又衢州開化縣普鑑院僧仲聞得取穴二法其一正坐堅立兩膝當乳以兩臂還抱屈手向膝以左手頭指以指捏左膝眼右手指亦然於背上數椎骨量穴依此坐灸又法正坐立膝同上以臂貼膝外直伸向足豎兩手相背以二頭指向身手捏兩足大趾頭歧間余亦如上其比同身寸只用伸指法似亦可用今俱存之不特以備見聞之博且使後人較其短長知所適從不為異端所惑心灸訖補養法第十孫真人云此穴灸訖令人陽氣康盛當消息以自補養取身體平復其補養之道宜食溫軟羹飯毋令太飽及飲啖生冷油膩黏滑鵝豬魚蝦筍蕨其他動氣發風之物並觸冒風寒暑濕勿以陽氣乍盛輒犯房室如覺氣壅可灸臍下氣海丹田關元中極四穴中一穴又當灸足三里引火氣以實下隨病深淺加以歲月將息則可保平復不然是猶倚一木以支大廈之傾又發而去之其終從晉候之歸非灸之罪也跋余自許昌遭金狄之難憂勞危難沖冒寒暑過此東下丁未八月抵泗濱感痎瘧既至琴川為醫妄治榮衛衰耗明年春末尚苦胕腫腹脹氣促不能食而大便利身重足痿杖而後起得陳了翁家專為灸膏肓俞自丁亥至癸巳積三百壯灸之次日既胸中氣平腫脹俱損利止而食進甲午已能肩輿出謁後再報之仍得百壯自是疾證浸減以至康寧時親舊間見此殊功灸者數人宿痾皆除孫真人謂若能用心方便求得其穴而灸之無疾不愈信不虛也因考醫經同異參以諸家之説及所親試自量寸以至補養之法分為十篇並繪身指屈伸坐立之像圖於逐篇之後令覽之者易解而無徒冤之失亦使真人求穴濟衆之仁益廣於天下也建炎二年二月十二日都總管同幹辦公事賜緋魚袋莊綽記
